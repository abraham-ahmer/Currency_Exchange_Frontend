<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Signup - Currency Exchange App</title>
    <link rel="icon" type="image/x-icon" href="images/logo.jpg">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <h1>Currency Exchange</h1>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="converter.html">Converter</a></li>
        <li><a href="live.html">Live Exchange</a></li>
        <li><a href="history.html">Historical Data</a></li>
        <li><a href="delete.html">Delete Account</a></li>
        <li><a href="signup.html">Signup</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>
    </nav>

    <!-- Signup form -->
    <main class="form-container">
      <div id="Loader" class="loader"></div>
      <h2>Create an Account</h2>

      <!-- Initial Signup Form -->
      <form id="signupForm">
        <input type="text" id="signUsername" placeholder="Username" required />
        <input type="email" id="signEmail" placeholder="Email" required />
        <input
          type="password"
          id="signPassword"
          placeholder="Password"
          required
        />
        <button type="submit">Signup</button>
        <div id="msgBox" style="visibility: none;"></div>
      </form>

      <!-- OTP Verification Form (Hidden initially) -->
      <form id="otpForm" class="otp-form" style="display: none">
        <p class="otp-message">
          <strong>✓ Check your email for OTP code</strong>
        </p>
        <input
          type="text"
          id="otpInput"
          placeholder="Enter 6-digit OTP"
          maxlength="6"
          required
        />
        <button type="submit" class="otp-btn">Verify OTP</button>
        <button type="button" id="backBtn" class="back-btn">Back</button>
      </form>

      <br />
      <p class="form-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </main>

    <script src="navbar.js"></script>
    <script src="signup.js"></script>
  </body>
</html>
