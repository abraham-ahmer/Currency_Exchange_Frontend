  <!-- Historical data form -->
  <main class="form-container">
    <h2>Historical Currency Data</h2>
    <div id="Loader" class="loader"></div>
    <form id="historyForm">
      <input type="text" id="historyBaseCurrency" placeholder="Base Currency (e.g. USD)" required>
      <input type="text" id="historyTargetCurrency" placeholder="Target Currency (e.g. PKR)" required>
      <input type="number" id="historyAmount" placeholder="Amount" required>
      <input type="date" id="historicalDate" required>
      <button type="submit">Get Historical Data</button>
    </form>
    <div id="historyResult" class="result"></div>
  </main>
